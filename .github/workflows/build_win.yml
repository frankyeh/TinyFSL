name: BUILD WIN

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag
        required: true
        default: 2026.06.01

permissions:
  contents: write

jobs:
  windows_build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            name: win-x64
            suffix: x64
            vs_arch: x64
            triplet: x64-windows

          - runner: windows-11-arm
            name: win-arm64
            suffix: arm64
            vs_arch: ARM64
            triplet: arm64-windows

    runs-on: ${{ matrix.runner }}

    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg

    steps:
      - uses: actions/checkout@v4

      - name: Prepare TIPL and Boost
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force fsl\include | Out-Null

          Remove-Item fsl\include\TIPL -Recurse -Force -ErrorAction SilentlyContinue
          git clone --depth 1 https://github.com/frankyeh/TIPL.git fsl\include\TIPL

          curl.exe -L https://archives.boost.io/release/1.77.0/source/boost_1_77_0.tar.bz2 -o boost.tar.bz2
          tar -xjf boost.tar.bz2
          Remove-Item fsl\include\boost -Recurse -Force -ErrorAction SilentlyContinue
          Move-Item boost_1_77_0\boost fsl\include\boost

      - name: Install OpenBLAS, LAPACK, and Zlib
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

          $packages = @("openblas:${{ matrix.triplet }}", "zlib:${{ matrix.triplet }}")
          if("${{ matrix.triplet }}" -ne "arm64-windows") {
            $packages += "lapack-reference:${{ matrix.triplet }}"
          }
          & "$env:VCPKG_ROOT\vcpkg.exe" install $packages
          if($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $libdir = "$env:VCPKG_ROOT\installed\${{ matrix.triplet }}\lib"
          $incdir = "$env:VCPKG_ROOT\installed\${{ matrix.triplet }}\include"
          $bindir = "$env:VCPKG_ROOT\installed\${{ matrix.triplet }}\bin"

          $blas = Get-ChildItem "$libdir\*.lib" | Where-Object { $_.Name -like "*openblas*.lib" -or $_.Name -eq "blas.lib" } | Select-Object -First 1
          $zlib = Get-ChildItem "$libdir\*.lib" | Where-Object { $_.Name -in @("z.lib","zlib.lib","zlibstatic.lib") -or $_.Name -like "zlib*.lib" } | Select-Object -First 1
          $lapack = @()
          if("${{ matrix.triplet }}" -ne "arm64-windows") {
            $lapack = Get-ChildItem "$libdir\*.lib" | Where-Object { $_.Name -like "*lapack*.lib" -or $_.Name -eq "tmglib.lib" } | Sort-Object Name
          }

          if(!$blas) {
            Get-ChildItem "$libdir\*.lib" | Select-Object -ExpandProperty Name
            throw "BLAS lib not found"
          }
          if("${{ matrix.triplet }}" -ne "arm64-windows" -and !$lapack) {
            Get-ChildItem "$libdir\*.lib" | Select-Object -ExpandProperty Name
            throw "LAPACK lib not found"
          }
          if(!$zlib) {
            Get-ChildItem "$libdir\*.lib" | Select-Object -ExpandProperty Name
            throw "Zlib lib not found"
          }

          if("${{ matrix.triplet }}" -eq "arm64-windows") {
            $blas_libs = @($blas.FullName)
            "EXTRA_CXX_FLAGS=/DARMA_DONT_USE_LAPACK" >> $env:GITHUB_ENV
          } else {
            $blas_libs = @($lapack.FullName) + @($blas.FullName)
            "EXTRA_CXX_FLAGS=" >> $env:GITHUB_ENV
          }

          "BLAS_LIB=$($blas_libs -join ';')" >> $env:GITHUB_ENV
          "BLAS_LIB_DIR=$libdir" >> $env:GITHUB_ENV
          "ZLIB_LIB=$($zlib.FullName)" >> $env:GITHUB_ENV
          "ZLIB_INC=$incdir" >> $env:GITHUB_ENV
          "DLL_DIR=$bindir" >> $env:GITHUB_ENV

      - name: Compile programs
        shell: pwsh
        run: |
          $opts = @(
            "-DBoost_INCLUDE_DIR=$env:GITHUB_WORKSPACE\fsl\include",
            "-DBLAS_LIB_DIR=$env:BLAS_LIB_DIR",
            "-DBLAS_LIBRARIES=$env:BLAS_LIB",
            "-DZLIB_LIBRARY=$env:ZLIB_LIB",
            "-DZLIB_INCLUDE_DIR=$env:ZLIB_INC",
            "-DTIPL_DIR=$env:GITHUB_WORKSPACE\fsl\include",
            "-DCMAKE_CXX_FLAGS=$env:EXTRA_CXX_FLAGS",
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake",
            "-DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}"
          )

          foreach($app in "eddy","topup","applytopup","bet2")
          {
            cmake -S $app -B "build_$app" -G "Visual Studio 17 2022" -A "${{ matrix.vs_arch }}" @opts
            cmake --build "build_$app" --config Release --parallel
          }

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force tiny_fsl | Out-Null

          Move-Item build_eddy\Release\eddy.exe tiny_fsl\
          Move-Item build_topup\Release\topup.exe tiny_fsl\
          Move-Item build_applytopup\Release\applytopup.exe tiny_fsl\
          Move-Item build_bet2\Release\bet2.exe tiny_fsl\

          Copy-Item "$env:DLL_DIR\*.dll" tiny_fsl\ -ErrorAction SilentlyContinue
          Copy-Item FSL_LICENSE tiny_fsl\

          Compress-Archive -Path tiny_fsl -DestinationPath tiny_fsl_win_${{ matrix.suffix }}.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: tiny_fsl_win_${{ matrix.suffix }}.zip

  windows_cuda_build:
    needs: windows_build
    if: ${{ always() }}
    runs-on: windows-2022

    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg

    steps:
      - uses: actions/checkout@v4

      - name: Download x64 package
        uses: actions/download-artifact@v4
        with:
          name: win-x64

      - name: Unzip x64 package
        shell: pwsh
        run: |
          Expand-Archive tiny_fsl_win_x64.zip -DestinationPath . -Force

      - name: Install Ninja and CMake
        shell: cmd
        run: |
          choco install ninja cmake -y

      - name: Prepare TIPL and Boost
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force fsl\include | Out-Null

          Remove-Item fsl\include\TIPL -Recurse -Force -ErrorAction SilentlyContinue
          git clone --depth 1 https://github.com/frankyeh/TIPL.git fsl\include\TIPL

          curl.exe -L https://archives.boost.io/release/1.77.0/source/boost_1_77_0.tar.bz2 -o boost.tar.bz2
          tar -xjf boost.tar.bz2
          Remove-Item fsl\include\boost -Recurse -Force -ErrorAction SilentlyContinue
          Move-Item boost_1_77_0\boost fsl\include\boost

      - name: Install OpenBLAS, LAPACK, and Zlib
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          & "$env:VCPKG_ROOT\vcpkg.exe" install openblas:x64-windows lapack-reference:x64-windows zlib:x64-windows
          if($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $libdir = "$env:VCPKG_ROOT\installed\x64-windows\lib"
          $incdir = "$env:VCPKG_ROOT\installed\x64-windows\include"
          $bindir = "$env:VCPKG_ROOT\installed\x64-windows\bin"

          $blas = Get-ChildItem "$libdir\*.lib" | Where-Object { $_.Name -like "*openblas*.lib" -or $_.Name -eq "blas.lib" } | Select-Object -First 1
          $lapack = Get-ChildItem "$libdir\*.lib" | Where-Object { $_.Name -like "*lapack*.lib" -or $_.Name -eq "tmglib.lib" } | Sort-Object Name
          $zlib = Get-ChildItem "$libdir\*.lib" | Where-Object { $_.Name -in @("z.lib","zlib.lib","zlibstatic.lib") -or $_.Name -like "zlib*.lib" } | Select-Object -First 1

          if(!$blas) {
            Get-ChildItem "$libdir\*.lib" | Select-Object -ExpandProperty Name
            throw "BLAS lib not found"
          }
          if(!$lapack) {
            Get-ChildItem "$libdir\*.lib" | Select-Object -ExpandProperty Name
            throw "LAPACK lib not found"
          }
          if(!$zlib) {
            Get-ChildItem "$libdir\*.lib" | Select-Object -ExpandProperty Name
            throw "Zlib lib not found"
          }

          $blas_libs = @($lapack.FullName) + @($blas.FullName)
          "BLAS_LIB=$($blas_libs -join ';')" >> $env:GITHUB_ENV
          "BLAS_LIB_DIR=$libdir" >> $env:GITHUB_ENV
          "ZLIB_LIB=$($zlib.FullName)" >> $env:GITHUB_ENV
          "ZLIB_INC=$incdir" >> $env:GITHUB_ENV
          "DLL_DIR=$bindir" >> $env:GITHUB_ENV

      - name: Install CUDA
        id: cuda-toolkit
        uses: Jimver/cuda-toolkit@v0.2.5

      - name: Compile CUDA EDDY
        shell: cmd
        run: |
          for /f "usebackq delims=#" %%a in (`"%programfiles(x86)%\Microsoft Visual Studio\Installer\vswhere" -latest -property installationPath`) do call "%%a\Common7\Tools\VsDevCmd.bat" -arch=x64

          cmake -S eddy -B build_eddy -GNinja ^
            -DBLAS_LIB_DIR="%BLAS_LIB_DIR%" ^
            -DBLAS_LIBRARIES="%BLAS_LIB%" ^
            -DZLIB_LIBRARY="%ZLIB_LIB%" ^
            -DZLIB_INCLUDE_DIR="%ZLIB_INC%" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DCUDA_ARCH=all ^
            "-DCUDA_PATH=${{ steps.cuda-toolkit.outputs.CUDA_PATH }}" ^
            -DTIPL_DIR="%GITHUB_WORKSPACE%\fsl\include"

          cmake --build build_eddy --parallel --config Release

      - name: Add CUDA EDDY to x64 package
        shell: pwsh
        run: |
          Move-Item build_eddy\eddy.exe tiny_fsl\eddy_cuda.exe -Force
          Copy-Item "$env:DLL_DIR\*.dll" tiny_fsl\ -ErrorAction SilentlyContinue
          Remove-Item tiny_fsl_win_x64.zip -Force
          Compress-Archive -Path tiny_fsl -DestinationPath tiny_fsl_win_x64.zip -Force

      - name: Upload x64 CUDA package
        uses: actions/upload-artifact@v4
        with:
          name: win-x64-cuda
          path: tiny_fsl_win_x64.zip

  release_cpu:
    needs: windows_build
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: win-x64
          path: release_assets/x64

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: win-arm64
          path: release_assets/arm64

      - name: Upload CPU release files
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          files=$(find release_assets -name '*.zip' -print)
          test -n "$files"
          ls -lh $files
          gh release view "$TAG" --repo "$REPO"
          gh release upload "$TAG" $files --repo "$REPO" --clobber

  release_cuda:
    needs: windows_cuda_build
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - name: Download x64 CUDA artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: win-x64-cuda
          path: release_assets/cuda

      - name: Upload CUDA release file
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          files=$(find release_assets -name '*.zip' -print || true)
          if [ -z "$files" ]; then
            echo "No CUDA artifact to upload"
            exit 0
          fi
          ls -lh $files
          gh release view "$TAG" --repo "$REPO"
          gh release upload "$TAG" $files --repo "$REPO" --clobber

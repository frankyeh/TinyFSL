name: BUILD MAC

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag
        required: true
        default: 2026.06.01

permissions:
  contents: write

jobs:
  mac_build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            name: macos-14-arm64
            arch: arm64
            jobs: 3

          - runner: macos-15-intel
            name: macos-15-intel
            arch: x86_64
            jobs: 4

    runs-on: ${{ matrix.runner }}

    env:
      CFLAGS: -Werror
      CXXFLAGS: -DGL_SILENCE_DEPRECATION -Wno-deprecated-declarations

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew update
          brew install cmake ninja ccache gcc

      - name: Download TIPL
        run: |
          rm -rf fsl/include/TIPL
          git clone --depth 1 https://github.com/frankyeh/TIPL.git fsl/include/TIPL

      - name: Download Boost
        run: |
          curl -fsSL https://archives.boost.io/release/1.77.0/source/boost_1_77_0.tar.bz2 -o boost.tar.bz2
          tar -xjf boost.tar.bz2
          rm -rf fsl/include/boost
          mv boost_1_77_0/boost fsl/include/
          mkdir -p tiny_fsl_bin

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: macos-ccache-${{ matrix.name }}-${{ github.ref_name }}
          restore-keys: |
            macos-ccache-${{ matrix.name }}-

      - name: Compile programs
        run: |
          for app in topup applytopup bet2 eddy
          do
            cmake -S "$app" -B "build_$app" -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
              -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_FLAGS="$CXXFLAGS" \
              -DBLAS_LIBRARIES="-framework Accelerate" \
              -DTIPL_DIR="${GITHUB_WORKSPACE}/fsl/include"

            cmake --build "build_$app" --parallel ${{ matrix.jobs }} --config Release
            mv "build_$app/$app" tiny_fsl_bin/
          done

      - name: Package
        run: |
          mv tiny_fsl_bin tiny_fsl
          cp FSL_LICENSE tiny_fsl/
          ditto -c -k --sequesterRsrc --keepParent tiny_fsl tiny_fsl_${{ matrix.name }}.zip
          ls -lh tiny_fsl_${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiny_fsl_${{ matrix.name }}
          path: tiny_fsl_${{ matrix.name }}.zip

  release:
    needs: mac_build
    runs-on: ubuntu-latest

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: tiny_fsl_macos-14-arm64
          path: release_assets

      - name: Download Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: tiny_fsl_macos-15-intel
          path: release_assets

      - name: Upload release files
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ls -lh release_assets/*.zip
          gh release view "$TAG" --repo "$REPO"
          gh release upload "$TAG" release_assets/*.zip --repo "$REPO" --clobber
